<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks – To-Do App</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
  <div class="container">
    <h1>To-Do App</h1>
    <nav>
      <a href="/">Home</a>
      <span id="nav-username" style="color:white;font-weight:500;margin:0 15px;"></span>
      <a href="#" id="logout-link">Logout</a>
    </nav>
  </div>
</header>

<main class="container">
  <div id="flash-container"></div>

  <div class="task-box">
    <h1>Your Tasks</h1>

    <form id="add-form" class="task-form">
      <input type="text" id="new-task-title" placeholder="New task" required>
      <button type="submit" class="btn">Add</button>
    </form>

    <div id="tasks-section"></div>
  </div>
</main>

<footer>
  <div class="container">
    <p>&copy; 2025 My To-Do App</p>
  </div>
</footer>

<script>
  const token = localStorage.getItem('token');
  const username = localStorage.getItem('username');

  if (!token) {
    window.location.href = '/login.html';
  }

  document.getElementById('nav-username').textContent = username ? `Hi, ${username}` : '';

  document.getElementById('logout-link').addEventListener('click', (e) => {
    e.preventDefault();
    localStorage.removeItem('token');
    localStorage.removeItem('username');
    window.location.href = '/';
  });

  function showFlash(message, type) {
    const container = document.getElementById('flash-container');
    container.innerHTML = `<div class="flash ${type}">${message}</div>`;
    setTimeout(() => { container.innerHTML = ''; }, 3000);
  }

  async function api(url, options = {}) {
    const headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...(options.headers || {}),
    };
    const res = await fetch(url, { ...options, headers });
    if (res.status === 401) {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/login.html';
      return null;
    }
    return res;
  }

  function badgeClass(status) {
    return status.toLowerCase();
  }

  function renderTasks(tasks) {
    const section = document.getElementById('tasks-section');
    if (!tasks || tasks.length === 0) {
      section.innerHTML = '<p>No tasks yet. Add one above.</p>';
      return;
    }

    let html = `
      <form id="clear-form" style="margin-bottom:10px;">
        <button type="submit" class="btn btn-clear">Clear All Tasks</button>
      </form>
      <table class="task-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Task</th>
            <th>Status</th>
            <th>Change</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody>
    `;

    tasks.forEach((task, i) => {
      html += `
        <tr>
          <td>${i + 1}</td>
          <td>${escapeHtml(task.title)}</td>
          <td><span class="badge ${badgeClass(task.status)}">${task.status}</span></td>
          <td>
            <button class="btn-small" onclick="toggleTask(${task.id})">Next</button>
          </td>
          <td>
            <button class="btn-small" onclick="deleteTask(${task.id})">Delete Task</button>
          </td>
        </tr>
      `;
    });

    html += '</tbody></table>';
    section.innerHTML = html;

    document.getElementById('clear-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!confirm('Clear all tasks?')) return;
      const res = await api('/api/tasks', { method: 'DELETE' });
      if (res && res.ok) {
        showFlash('All tasks cleared', 'info');
        loadTasks();
      }
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  async function loadTasks() {
    const res = await api('/api/tasks');
    if (!res) return;
    if (!res.ok) { showFlash('Failed to load tasks', 'danger'); return; }
    const data = await res.json();
    renderTasks(data.tasks);
  }

  async function toggleTask(id) {
    const res = await api(`/api/tasks/${id}`, { method: 'POST' });
    if (res && res.ok) {
      showFlash('Task status updated', 'info');
      loadTasks();
    }
  }

  async function deleteTask(id) {
    const res = await api(`/api/tasks/${id}`, { method: 'DELETE' });
    if (res && res.ok) {
      showFlash('Task deleted', 'info');
      loadTasks();
    }
  }

  document.getElementById('add-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('new-task-title').value.trim();
    if (!title) return;
    const res = await api('/api/tasks', {
      method: 'POST',
      body: JSON.stringify({ title }),
    });
    if (res && res.ok) {
      document.getElementById('new-task-title').value = '';
      showFlash('Task added successfully', 'success');
      loadTasks();
    } else if (res) {
      const data = await res.json();
      showFlash(data.error || 'Failed to add task', 'danger');
    }
  });

  loadTasks();
</script>
</body>
</html>
