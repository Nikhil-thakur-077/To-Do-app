{% extends "base.html" %}
{% block title %}Home{% endblock %}

{% block content %}
<div class="login-box">
    <h2>Welcome to To-Do App</h2>
    <p style="text-align: center; margin-bottom: 24px;">
        Organize your tasks, track your progress, and stay productive.
    </p>
    <div style="display: flex; gap: 12px; justify-content: center;">
        <a href="{{ url_for('auth.login') }}" class="btn" style="text-decoration: none;">Login</a>
        <a href="{{ url_for('auth.register') }}" class="btn" style="text-decoration: none;">Register</a>
    </div>
</div>
{% endblock %}
